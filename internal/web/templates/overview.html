{{define "title"}}Overview - Twitch Points Miner{{end}}

{{define "content"}}
<style>
    /* Overview card visual system v2. Inline (not input.css) because the
       Tailwind build is not re-run for template-only changes; every colour
       comes from the shared --ui-* semantic palette defined in base.html.
       State is still conveyed by badge text + border style, never colour
       alone: watching = solid glow, queued = dashed, disabled = dotted. */
    .s-card { border-radius: 0.8rem; }
    .s-card.state-watching {
        border-color: var(--ui-watching);
        background:
            linear-gradient(180deg, rgba(169, 112, 255, 0.12), rgba(169, 112, 255, 0.02) 46%, transparent 72%),
            var(--color-neutral-800);
        box-shadow: 0 0 0 1px rgba(169, 112, 255, 0.45), 0 0 18px rgba(169, 112, 255, 0.22);
    }
    .s-card.state-watching:hover { border-color: var(--ui-watching); }
    .s-card.state-queued {
        border-color: rgba(54, 215, 255, 0.55);
        background:
            linear-gradient(180deg, rgba(54, 215, 255, 0.07), transparent 55%),
            var(--color-neutral-800);
        box-shadow: 0 0 10px rgba(54, 215, 255, 0.08);
    }
    .s-card.state-offline { background: var(--color-neutral-800); }

    /* Live stream title: up to two clamped lines, full text on hover title=. */
    .s-title {
        margin-top: 0.5rem;
        font-size: 0.78rem;
        line-height: 1.35;
        color: var(--color-neutral-200);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        overflow-wrap: anywhere;
    }
    .s-game { color: var(--ui-online); }

    /* Stream tag chips: single row, overflowing chips are simply cut off. */
    .s-tags {
        display: flex;
        gap: 0.3rem;
        margin-top: 0.45rem;
        overflow: hidden;
        flex-wrap: nowrap;
        max-width: 100%;
    }
    .s-tag {
        flex: none;
        max-width: 9.5rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.66rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        padding: 0.1rem 0.45rem;
        border-radius: 999px;
        color: var(--ui-online);
        background: rgba(54, 215, 255, 0.10);
        border: 1px solid rgba(54, 215, 255, 0.28);
    }

    /* Section headers for the in-page anchors the sidebar links to
       (#predictions / #grid): a small accent bar ties each section to its
       nav item, and scroll-margin keeps the heading visible after the jump. */
    #predictions, #grid { scroll-margin-top: 0.75rem; }
    .sec-accent {
        display: inline-block;
        width: 0.5rem;
        height: 0.9em;
        border-radius: 2px;
        margin-right: 0.45rem;
        vertical-align: -0.1em;
    }
    .sec-accent-pred { background: linear-gradient(180deg, var(--ui-watching), var(--ui-online)); }
    .sec-accent-grid { background: linear-gradient(180deg, var(--ui-online), var(--ui-gain)); }
</style>
<div id="overview-live" hx-get="/api/overview" hx-trigger="every 30s, refresh" hx-swap="innerHTML">
    {{template "overview_live" .}}
</div>

<dialog id="events-drawer" class="modal-dialog">
    <div id="events-drawer-body" class="p-0"></div>
</dialog>

<div id="toast-container"></div>
{{end}}

{{define "scripts"}}
<script>
    // Toasts.
    function showToast(message, type) {
        const container = document.getElementById('toast-container');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = 'toast ' + (type === 'error' ? 'toast-error' : 'toast-success');
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 2600);
    }

    // Card quick actions (priority cycle / watch toggle). Uses the same
    // settings pipeline as the Settings page; never opens the card.
    async function quickAction(btn, name, action) {
        btn.disabled = true;
        try {
            const res = await fetch('/api/streamer-action/' + encodeURIComponent(name), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action })
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.message || 'failed');
            if (action === 'cycle-preference') {
                const label = data.preference === 'prefer' ? t('js.ov.pref_preferred') : (data.preference === 'avoid' ? t('js.ov.pref_avoided') : t('js.ov.pref_neutral'));
                showToast(name + ' → ' + label);
            } else {
                showToast(name + ' → ' + (data.disableWatch ? t('js.ov.watching_disabled') : t('js.ov.watching_enabled')));
            }
            // Refresh the live grid so badges/state reflect the change.
            if (window.htmx) htmx.trigger('#overview-live', 'refresh');
        } catch (e) {
            showToast(t('js.ov.action_failed'), 'error');
        } finally {
            btn.disabled = false;
        }
    }

    // Card body click → recent-events drawer (no navigation).
    function openEvents(name) {
        const drawer = document.getElementById('events-drawer');
        const body = document.getElementById('events-drawer-body');
        body.innerHTML = '<div class="p-5 text-neutral-400 text-sm">' + t('js.ov.loading') + '</div>';
        if (typeof drawer.showModal === 'function') drawer.showModal();
        fetch('/api/overview/events/' + encodeURIComponent(name))
            .then(r => r.text())
            .then(html => { body.innerHTML = html; })
            .catch(() => { body.innerHTML = '<div class="p-5 text-danger text-sm">' + t('js.ov.failed_events') + '</div>'; });
    }

    document.addEventListener('click', (e) => {
        const qa = e.target.closest('[data-action]');
        if (qa) {
            e.stopPropagation();
            e.preventDefault();
            quickAction(qa, qa.getAttribute('data-streamer'), qa.getAttribute('data-action'));
            return;
        }
        const closeBtn = e.target.closest('[data-drawer-close]');
        if (closeBtn) { document.getElementById('events-drawer').close(); return; }
        if (e.target.id === 'events-drawer') { e.target.close(); return; }
        const card = e.target.closest('[data-card-streamer]');
        if (card) { openEvents(card.getAttribute('data-card-streamer')); }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const card = e.target.closest('[data-card-streamer]');
        if (card) { e.preventDefault(); openEvents(card.getAttribute('data-card-streamer')); }
    });
</script>

<script>
    // =====================================================================
    // Manual prediction betting + per-round auto-bet skip.
    //
    // The board re-renders every 30s (htmx innerHTML swap). Authoritative
    // "placed / skipped" state comes from the server payload and so survives
    // re-renders on its own. The purely transient UI state (which outcome is
    // picked, the typed amount, whether the confirm bar is open, the last live
    // error) is kept in `manualUI` keyed by the stable event id and re-applied
    // after every swap, so an in-progress bet is never lost to a refresh.
    // =====================================================================
    const manualUI = {};

    function stateFor(eventId) {
        if (!manualUI[eventId]) manualUI[eventId] = { outcomeId: '', outcomeTitle: '', amount: '', confirming: false, error: '', inflight: false };
        return manualUI[eventId];
    }

    function predCardFor(el) { return el.closest('[data-pred]'); }

    // Validate the typed amount against the min stake and the (server-supplied)
    // balance. Never trusts the DOM for the real decision — this only gates the
    // button and shows a hint; the backend re-checks everything.
    function amountState(manual) {
        const min = parseInt(manual.dataset.min || '10', 10);
        const balance = parseInt(manual.dataset.balance || '0', 10);
        const st = stateFor(manual.dataset.eventId);
        const raw = (st.amount || '').trim();
        if (raw === '') return { ok: false, hint: '' };
        const n = Number(raw);
        if (!Number.isInteger(n) || n <= 0) return { ok: false, hint: t('js.ov.enter_whole') };
        if (n < min) return { ok: false, hint: t('js.ov.min_bet', { n: min }) };
        if (n > balance) return { ok: false, hint: t('js.ov.exceeds_balance') };
        return { ok: true, hint: '', value: n };
    }

    function updatePlaceState(manual) {
        const st = stateFor(manual.dataset.eventId);
        const place = manual.querySelector('[data-place]');
        const amt = amountState(manual);
        const ready = !!st.outcomeId && amt.ok && !st.inflight;
        if (place) place.disabled = !ready;
        // Live hint for a bad/oversized amount (not a server error).
        const liveErr = manual.querySelector('[data-live-error]');
        if (liveErr && !st.error) {
            if (amt.hint) { liveErr.textContent = amt.hint; liveErr.hidden = false; }
            else { liveErr.hidden = true; }
        }
    }

    function showLiveError(manual, msg) {
        const liveErr = manual.querySelector('[data-live-error]');
        if (liveErr) { liveErr.textContent = msg; liveErr.hidden = !msg; }
    }

    function selectOutcome(card, row) {
        const eventId = card.dataset.eventId;
        const st = stateFor(eventId);
        st.outcomeId = row.dataset.outcomeId;
        st.outcomeTitle = row.dataset.outcomeTitle || '';
        st.confirming = false; st.error = '';
        card.querySelectorAll('[data-outcome-id]').forEach(r => {
            const on = r === row;
            r.classList.toggle('picked', on);
            r.setAttribute('aria-checked', on ? 'true' : 'false');
        });
        const manual = card.querySelector('[data-manual]');
        if (manual) { exitConfirm(manual); updatePlaceState(manual); }
    }

    function enterConfirm(manual) {
        const st = stateFor(manual.dataset.eventId);
        const amt = amountState(manual);
        if (!st.outcomeId || !amt.ok) return;
        st.confirming = true;
        const confirm = manual.querySelector('[data-confirm]');
        const text = manual.querySelector('[data-confirm-text]');
        const place = manual.querySelector('[data-place]');
        const balance = parseInt(manual.dataset.balance || '0', 10);
        if (text) text.innerHTML = t('js.ov.bet_confirm', {
            amount: '<strong>' + amt.value.toLocaleString() + '</strong>',
            outcome: '<strong>' + (st.outcomeTitle || t('js.ov.selected_outcome')) + '</strong>',
            balance: balance.toLocaleString()
        });
        if (confirm) confirm.hidden = false;
        if (place) place.hidden = true;
        updateBusy();
    }

    function exitConfirm(manual) {
        const st = stateFor(manual.dataset.eventId);
        st.confirming = false;
        const confirm = manual.querySelector('[data-confirm]');
        const place = manual.querySelector('[data-place]');
        if (confirm) confirm.hidden = true;
        if (place) place.hidden = false;
        updateBusy();
    }

    async function sendBet(manual) {
        const eventId = manual.dataset.eventId;
        const st = stateFor(eventId);
        const amt = amountState(manual);
        if (!st.outcomeId || !amt.ok || st.inflight) return;
        st.inflight = true; st.error = '';
        updateBusy();
        manual.classList.add('is-sending');
        const go = manual.querySelector('[data-go]');
        if (go) go.disabled = true;
        try {
            const res = await fetch('/api/prediction/bet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ eventId: eventId, outcomeId: st.outcomeId, amount: amt.value })
            });
            const data = await res.json().catch(() => ({ success: false, message: t('js.ov.unexpected_response') }));
            if (res.status !== 200) throw new Error((data && data.message) || t('js.ov.request_failed', { status: res.status }));
            if (!data.success) {
                st.inflight = false; st.confirming = false;
                st.error = data.message || t('js.ov.bet_failed');
                showToast(st.error, 'error');
                updateBusy();
                if (window.htmx) htmx.trigger('#overview-live', 'refresh');
                return;
            }
            delete manualUI[eventId];
            showToast(t('js.ov.bet_placed', { amount: (data.amount || amt.value).toLocaleString(), outcome: (data.outcome || st.outcomeTitle) }));
            updateBusy();
            if (window.htmx) htmx.trigger('#overview-live', 'refresh');
        } catch (e) {
            st.inflight = false; st.confirming = false;
            st.error = e.message || t('js.ov.conn_lost_bet');
            showToast(st.error, 'error');
            showLiveError(manual, st.error);
            updateBusy();
        }
    }

    async function sendSkip(eventId, skip, input) {
        if (input) input.disabled = true;
        try {
            const res = await fetch('/api/prediction/skip', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ eventId: eventId, skip: skip })
            });
            const data = await res.json().catch(() => ({ success: false, message: t('js.ov.unexpected_response') }));
            if (res.status !== 200 || !data.success) throw new Error((data && data.message) || t('js.ov.could_not_update_autobet'));
            showToast(data.message || (skip ? t('js.ov.autobet_skipped') : t('js.ov.autobet_reenabled')));
            if (window.htmx) htmx.trigger('#overview-live', 'refresh');
        } catch (e) {
            showToast(e.message || t('js.ov.action_failed'), 'error');
            if (input && input.type === 'checkbox') input.checked = !skip; // revert
        } finally {
            if (input) input.disabled = false;
        }
    }

    // Pause the periodic swap only while a confirm bar is open or a bet is in
    // flight (both short-lived), so those never vanish mid-interaction. Typed
    // amounts / picked outcomes survive via rehydrate instead.
    function updateBusy() {
        window.__predBusy = Object.values(manualUI).some(s => s.confirming || s.inflight);
    }

    // Re-apply transient manual UI state to freshly-swapped cards.
    function rehydrateManual() {
        document.querySelectorAll('[data-manual]').forEach(manual => {
            const eventId = manual.dataset.eventId;
            const st = manualUI[eventId];
            if (!st) return;
            const card = predCardFor(manual);
            if (st.outcomeId && card) {
                const row = card.querySelector('[data-outcome-id="' + CSS.escape(st.outcomeId) + '"]');
                if (row) { row.classList.add('picked'); row.setAttribute('aria-checked', 'true'); }
            }
            const input = manual.querySelector('[data-amount]');
            if (input && st.amount) input.value = st.amount;
            if (st.error) showLiveError(manual, st.error);
            if (st.confirming) enterConfirm(manual); else updatePlaceState(manual);
        });
        // Drop UI state for rounds that are no longer on the board.
        const live = new Set(Array.from(document.querySelectorAll('[data-manual]')).map(m => m.dataset.eventId));
        Object.keys(manualUI).forEach(id => { if (!live.has(id)) delete manualUI[id]; });
        updateBusy();
    }

    // Cancel the periodic poll while busy so an open confirm / in-flight bet is
    // not swapped away underneath the user.
    document.body.addEventListener('htmx:beforeRequest', (e) => {
        const elt = e.detail && e.detail.elt;
        if (elt && elt.id === 'overview-live' && window.__predBusy) {
            const trig = e.detail.requestConfig && e.detail.requestConfig.triggeringEvent;
            // Allow explicit refreshes (our own success/skip triggers), block the timer.
            if (!trig || trig.type === 'every' || trig.type === 'load') e.preventDefault();
        }
    });

    document.addEventListener('click', (e) => {
        const row = e.target.closest('[data-outcome-id]');
        if (row) { const card = predCardFor(row); if (card) { selectOutcome(card, row); } return; }
        const place = e.target.closest('[data-place]');
        if (place) { const m = place.closest('[data-manual]'); if (m) enterConfirm(m); return; }
        const cancel = e.target.closest('[data-cancel]');
        if (cancel) { const m = cancel.closest('[data-manual]'); if (m) exitConfirm(m); return; }
        const go = e.target.closest('[data-go]');
        if (go) { const m = go.closest('[data-manual]'); if (m) sendBet(m); return; }
        const unskip = e.target.closest('[data-unskip]');
        if (unskip) { sendSkip(unskip.dataset.eventId, false, unskip); return; }
    });

    document.addEventListener('input', (e) => {
        const input = e.target.closest('[data-amount]');
        if (!input) return;
        const manual = input.closest('[data-manual]');
        if (!manual) return;
        const st = stateFor(manual.dataset.eventId);
        st.amount = input.value; st.error = ''; st.confirming = false;
        exitConfirm(manual);
        updatePlaceState(manual);
    });

    document.addEventListener('change', (e) => {
        const skip = e.target.closest('[data-skip]');
        if (skip) { const m = skip.closest('[data-manual]'); if (m) sendSkip(m.dataset.eventId, skip.checked, skip); return; }
    });

    document.addEventListener('click', (e) => {
        const chip = e.target.closest('[data-fill]');
        if (!chip) return;
        const manual = chip.closest('[data-manual]');
        if (!manual) return;
        const balance = parseInt(manual.dataset.balance || '0', 10);
        const kind = chip.dataset.fill;
        let val = balance;
        if (kind === '25') val = Math.floor(balance * 0.25);
        else if (kind === '50') val = Math.floor(balance * 0.5);
        const min = parseInt(manual.dataset.min || '10', 10);
        if (val < min) val = Math.min(min, balance);
        const input = manual.querySelector('[data-amount]');
        if (input) input.value = val;
        const st = stateFor(manual.dataset.eventId);
        st.amount = String(val); st.error = ''; st.confirming = false;
        exitConfirm(manual);
        updatePlaceState(manual);
    });

    // Keyboard: pick an outcome with Enter/Space when focused.
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const row = e.target.closest('[data-outcome-id]');
        if (row) { e.preventDefault(); const card = predCardFor(row); if (card) selectOutcome(card, row); }
    });

    document.body.addEventListener('htmx:afterSwap', rehydrateManual);
    rehydrateManual();
</script>
{{end}}
