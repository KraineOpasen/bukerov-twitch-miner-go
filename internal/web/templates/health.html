{{define "title"}}{{ t "health.title" }} - Twitch Points Miner{{end}}

{{define "content"}}
<h1 class="text-3xl font-bold mb-2">{{ t "health.title" }}</h1>
<p class="text-neutral-400 text-sm mb-6">{{ t "health.subtitle" }}</p>

<section id="health-center" hx-get="/api/health" hx-trigger="load, every 15s" hx-swap="innerHTML">
    <div class="animate-pulse text-neutral-400">{{ t "health.loading" }}</div>
</section>
{{end}}
