<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Twitch Points Miner{{end}}</title>
    <link rel="icon" href="/static/images/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/apple-touch-icon-180x180.png">
    <link rel="manifest" href="/static/site.webmanifest">
    <meta name="theme-color" content="#15161c">
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/js/htmx.min.js" defer></script>
    <script src="/static/js/apexcharts.min.js" defer></script>
    <style>
        #health-banner {
            padding: 0.6rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid transparent;
        }
        #health-banner.health-banner-reauth {
            background-color: rgba(201, 123, 99, 0.12);
            border-color: #c97b63;
            color: #d99680;
        }
        #health-banner.health-banner-lost {
            background-color: rgba(217, 162, 92, 0.12);
            border-color: #d9a25c;
            color: #e0b074;
        }
    </style>
</head>
<body class="min-h-screen bg-neutral-900 text-neutral-100">
    <div id="status-overlay" class="status-overlay hidden fixed inset-0 bg-neutral-900/95 flex items-center justify-center z-[1000]">
        <div class="bg-neutral-800 border border-neutral-700 rounded-xl p-8 max-w-md w-[90%] text-center">
            <h2 id="status-title" class="text-purple-500 text-xl font-semibold mb-4">Initializing...</h2>
            <div class="w-12 h-12 border-4 border-neutral-700 border-t-purple-500 rounded-full animate-spin mx-auto my-6" id="status-spinner"></div>
            <div id="status-content"></div>
            <p class="text-neutral-400 mt-2 text-sm" id="status-message"></p>
        </div>
    </div>

    <div class="app-shell">
        <aside class="app-sidebar" id="app-sidebar">
            <a href="/" class="flex items-center gap-2 px-4 py-4 text-base font-semibold text-neutral-100">
                <img src="/static/images/sidebar-logo-128.png" alt="Twitch Points Miner logo" width="28" height="28" class="w-7 h-7 shrink-0">
                <span>Points Miner</span>
            </a>

            <nav class="flex flex-col py-1" aria-label="Primary">
                <a href="/" data-nav="/" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
                    Overview
                </a>
                <a href="/#grid" data-nav="#grid" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    Стримеры
                </a>
                <a href="/drops" data-nav="/drops" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2s7 7 7 12a7 7 0 0 1-14 0c0-5 7-12 7-12z"/></svg>
                    Дропы
                </a>
                <a href="/#predictions" data-nav="#predictions" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
                    Предикшены
                </a>
                {{if .DiscordEnabled}}
                <a href="/notifications" data-nav="/notifications" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
                    Уведомления
                </a>
                {{end}}
                <a href="{{if .DebugURL}}{{.DebugURL}}{{else}}/settings#logger{{end}}" data-nav="/logs" class="sidebar-link" {{if .DebugURL}}target="_blank" rel="noopener" title="Diagnostic snapshot (localhost only)"{{end}}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
                    Логи
                </a>
                <a href="/settings" data-nav="/settings" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Настройки
                </a>
            </nav>

            <div class="now-watching" id="now-watching"
                 hx-get="/api/now-watching" hx-trigger="load, every 30s" hx-swap="innerHTML">
                <div class="text-xs uppercase tracking-wide text-neutral-400 mb-2">Сейчас смотрим</div>
                <div class="skeleton h-16"></div>
            </div>

            <div class="px-4 py-3 border-t border-neutral-700 text-xs text-neutral-400 flex items-center justify-between">
                <span class="inline-flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0 1 13 0"/></svg>
                    {{.Username}}
                </span>
                {{if .Version}}<span class="num">{{.Version}}</span>{{end}}
            </div>
        </aside>

        <main class="app-main">
            <button type="button" id="sidebar-toggle" class="md:hidden mb-3 qa-btn" aria-label="Toggle menu">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>

            <div id="health-banner" class="hidden" role="alert">
                <span id="health-banner-text"></span>
            </div>

            {{block "content" .}}{{end}}
        </main>
    </div>

    {{block "scripts" .}}{{end}}

    <script>
        // Highlight the active sidebar link by pathname (hash links stay
        // inactive so Overview keeps its highlight on the home page).
        (function() {
            const path = window.location.pathname;
            document.querySelectorAll('[data-nav]').forEach(a => {
                const nav = a.getAttribute('data-nav');
                if (nav.startsWith('#')) return;
                if (nav === '/logs') return;
                if (nav === path || (nav === '/' && path === '/')) a.classList.add('is-active');
            });
            const toggle = document.getElementById('sidebar-toggle');
            const sidebar = document.getElementById('app-sidebar');
            if (toggle && sidebar) {
                toggle.addEventListener('click', () => sidebar.classList.toggle('is-open'));
            }
        })();
    </script>

    <script>
        (function() {
            const overlay = document.getElementById('status-overlay');
            const title = document.getElementById('status-title');
            const content = document.getElementById('status-content');
            const message = document.getElementById('status-message');
            const spinner = document.getElementById('status-spinner');
            const healthBanner = document.getElementById('health-banner');
            const healthBannerText = document.getElementById('health-banner-text');

            function updateHealthBanner(status) {
                if (status.reauthRequired) {
                    healthBanner.className = 'health-banner-reauth';
                    healthBannerText.textContent = '⚠ Twitch authorization required — ' + (status.reauthMessage || 'please log in again.');
                } else if (status.connectionLost) {
                    healthBanner.className = 'health-banner-lost';
                    healthBannerText.textContent = '⚠ Connection lost — harvesting paused. ' + (status.connectionMessage || '');
                } else {
                    healthBanner.className = 'hidden';
                    healthBannerText.textContent = '';
                }
            }

            function updateStatus(status) {
                updateHealthBanner(status);

                if (status.status === 'running') {
                    overlay.classList.add('hidden');
                    const reloadKey = 'miner_loaded_' + window.location.pathname;
                    if (!sessionStorage.getItem(reloadKey)) {
                        sessionStorage.setItem(reloadKey, 'true');
                        window.location.reload();
                    }
                    return;
                }

                sessionStorage.removeItem('miner_loaded_' + window.location.pathname);
                overlay.classList.remove('hidden');

                switch (status.status) {
                    case 'initializing':
                        title.textContent = 'Initializing...';
                        content.innerHTML = '';
                        message.textContent = status.message || 'Starting up...';
                        spinner.style.display = 'block';
                        break;
                    case 'auth_required':
                        title.textContent = 'Twitch Login Required';
                        spinner.style.display = 'none';
                        if (status.auth) {
                            content.innerHTML = `
                                <p class="text-neutral-400">Open <a href="${status.auth.verificationUri}" target="_blank" class="text-purple-500 font-medium">${status.auth.verificationUri}</a></p>
                                <p class="text-neutral-400 mt-2">Enter this code:</p>
                                <div class="num text-3xl font-bold text-purple-500 bg-neutral-900 px-6 py-4 rounded-lg my-4 tracking-widest select-all">${status.auth.userCode}</div>
                                <p class="text-neutral-400 text-sm">Code expires in ${Math.floor(status.auth.expiresIn / 60)} minutes</p>
                            `;
                        }
                        message.textContent = 'Waiting for authorization...';
                        break;
                    case 'loading_streamers':
                        title.textContent = 'Loading Streamers';
                        content.innerHTML = status.streamerInfo ? `<p class="text-neutral-400">Loading: <strong class="text-neutral-100">${status.streamerInfo}</strong></p>` : '';
                        message.textContent = status.message || 'Please wait...';
                        spinner.style.display = 'block';
                        break;
                    case 'error':
                        title.textContent = 'Error';
                        content.innerHTML = '';
                        message.textContent = status.message || 'An error occurred';
                        spinner.style.display = 'none';
                        break;
                }
            }

            fetch('/api/miner-status').then(r => r.json()).then(updateStatus).catch(() => {});

            let evtSource = null;
            function connectSSE() {
                if (evtSource) return;
                evtSource = new EventSource('/api/miner-status/stream');
                evtSource.onmessage = function(event) {
                    try { updateStatus(JSON.parse(event.data)); } catch (e) {}
                };
                evtSource.onerror = function() {
                    setTimeout(() => { overlay.classList.add('hidden'); }, 5000);
                };
            }
            function disconnectSSE() { if (evtSource) { evtSource.close(); evtSource = null; } }
            connectSSE();
            window.addEventListener('pagehide', disconnectSSE);
            window.addEventListener('beforeunload', disconnectSSE);
        })();
    </script>
</body>
</html>
