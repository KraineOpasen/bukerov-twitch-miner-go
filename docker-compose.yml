services:
  twitch-miner:
    image: ghcr.io/kraineopasen/bukerov-twitch-miner-go:latest
    container_name: twitch-miner
    # restart: unless-stopped is REQUIRED for auto-update to work: when the
    # miner downloads a new release it replaces its own binary and exits 0,
    # relying on this restart policy to bring the container back up on the new
    # version. Without it the container would simply stop after an update.
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Self-update between releases. The image ships with this enabled; set it
      # to "false" to pin the container to its current binary.
      AUTO_UPDATE: "true"
      # How often to check GitHub Releases for a newer version. Accepts a Go
      # duration ("12h", "6h30m") or a bare number of hours ("12"). Default 8h.
      AUTO_UPDATE_CHECK_INTERVAL: "8h"
      # REQUIRED for the dashboard: the image binds the dashboard to all
      # container interfaces (DASHBOARD_HOST=0.0.0.0) so the published port
      # works, and a non-loopback bind refuses to start without credentials.
      # Uncomment and set both, or the container will exit at startup with an
      # explanatory error.
      # DASHBOARD_USERNAME: "admin"
      # DASHBOARD_PASSWORD: "change-me"
      # Alternative (NOT recommended): explicitly accept an unauthenticated
      # dashboard on a trusted network instead of setting credentials.
      # DASHBOARD_INSECURE_NO_AUTH: "true"
    volumes:
      - ./config:/config
      - ./cookies:/cookies
      - ./logs:/logs
      - ./database:/database
    # Mirrors the image's built-in HEALTHCHECK (the miner binary is its own
    # probe; the scratch image has no shell or curl). Remove this block to
    # fall back to the image defaults.
    healthcheck:
      test: ["CMD", "/twitch-miner-go", "-healthcheck", "-config", "/config/config.json"]
      interval: 60s
      timeout: 10s
      start_period: 120s
      retries: 3
    labels:
      # Exclude this container from Watchtower. The miner updates itself now, so
      # Watchtower must not also recreate it (that would fight the self-update
      # and drop the writable layer holding the freshly downloaded binary).
      com.centurylinklabs.watchtower.enable: "false"
