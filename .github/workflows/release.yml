name: Release

on:
  push:
    tags:
      - "v*"

# Least-privilege default. Only the jobs that need elevated scopes declare them
# at job level (release -> contents:write; docker -> packages/id-token/attestations).
permissions:
  contents: read

# Serialize release runs for the same tag so two concurrent runs cannot race to
# publish/attest the same immutable version tag. Never cancel an in-flight run:
# cancelling mid-push could leave partial/misleading metadata.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -v -race ./...

  build-binaries:
    needs: lint-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install UPX
        run: |
          curl -sLo /tmp/upx.tar.xz https://github.com/upx/upx/releases/download/v5.0.2/upx-5.0.2-amd64_linux.tar.xz
          cd /tmp && tar -xf upx.tar.xz
          sudo mv upx-5.0.2-amd64_linux/upx /usr/local/bin/

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # Pass the tag and suffix through the environment instead of
          # interpolating them straight into the shell command, so a crafted tag
          # name can never inject shell code. The produced binary is byte-for-byte
          # identical to the previous inline form for any valid tag.
          VERSION: ${{ github.ref_name }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w -X github.com/KraineOpasen/bukerov-twitch-miner-go/internal/version.Version=${VERSION}" \
            -o "twitch-miner-go-${SUFFIX}" \
            ./cmd/miner

      - name: Compress with UPX
        if: matrix.goos != 'darwin'
        env:
          SUFFIX: ${{ matrix.suffix }}
        run: upx --best --lzma "twitch-miner-go-${SUFFIX}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: twitch-miner-go-${{ matrix.suffix }}
          path: twitch-miner-go-${{ matrix.suffix }}

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum twitch-miner-go-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/twitch-miner-go-*
            dist/checksums.txt
          generate_release_notes: true

  docker:
    needs: build-binaries
    runs-on: ubuntu-latest
    # Only this trusted, tag-triggered job holds publish/attestation scopes.
    permissions:
      contents: read # checkout
      packages: write # push image + provenance OCI referrer to GHCR
      id-token: write # OIDC token for Sigstore keyless signing
      attestations: write # persist the attestation to the GitHub attestations API
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SBOM: BuildKit's built-in Syft scanner generates an SPDX SBOM per
          # platform and attaches it to the OCI image index as an attestation
          # manifest (Docker-native, no third-party generator). provenance is
          # disabled here so the ONLY provenance record is the signed GitHub
          # attestation created below, avoiding two conflicting provenance
          # predicates for the same digest.
          sbom: true
          provenance: false

      # Lowercase the owner/repo for the attestation subject: github.repository is
      # "KraineOpasen/..." but GHCR paths (and the pushed image) are lowercase.
      # The value passes through an env var and is never interpolated into the
      # shell command string, so no event field is evaluated by the shell.
      - name: Resolve image name
        id: image
        env:
          REPO: ${{ github.repository }}
        run: echo "name=ghcr.io/${REPO,,}" >> "$GITHUB_OUTPUT"

      # Provenance: keyless (GitHub OIDC / Sigstore / Rekor) SLSA build provenance
      # bound to the exact pushed OCI *index* digest (the digest users pull), and
      # also pushed to GHCR as an OCI referrer. Runs only after a successful push
      # (sequential step ordering), so a failed build emits no attestation.
      # create-storage-record is disabled: storage records only apply to
      # organization-owned repos, so on this user-owned repo it would be a no-op
      # and would otherwise require an extra artifact-metadata: write scope.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
